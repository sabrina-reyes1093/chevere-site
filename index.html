<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chévere</title>
  <link rel="icon" type="image/png" href="assets/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="home">

  <header class="site-header">
    <a class="header-mini-logo" href="index.html" aria-label="chévere home">
      <img src="assets/logo.png" alt="chévere" />
    </a>
    <a class="header-logo" href="index.html" aria-label="chévere home">
      <img src="assets/logo.png" alt="chévere" />
    </a>
    <div class="header-actions">
      <button aria-label="Search" title="Search"><i data-lucide="search" stroke-width="1.8" aria-hidden="true"></i></button>
      <button aria-label="Chat" title="Chat"><i data-lucide="message-circle" stroke-width="1.8" aria-hidden="true"></i></button>
      <button aria-label="Notifications" title="Notifications"><i data-lucide="bell" stroke-width="1.8" aria-hidden="true"></i></button>
    </div>
  </header>

  <nav class="site-nav">
    <a href="index.html" class="active">Home</a>
    <div class="nav-item has-dropdown">
      <a href="blog.html">Blog<i data-lucide="chevron-down" class="chev" stroke-width="2" aria-hidden="true"></i></a>
      <div class="dropdown">
        <a href="blog.html">All Blogs</a>
        <a href="blog.html?cat=books">Books</a>
        <a href="blog.html?cat=tv-film">TV &amp; Film</a>
        <a href="blog.html?cat=travel">Travel</a>
        <a href="blog.html?cat=food-drink">Food &amp; Drink</a>
        <a href="blog.html?cat=fashion">Fashion</a>
      </div>
    </div>
    <a href="about.html">About</a>
  </nav>

  <main class="home-main">
    <aside class="side-col left" aria-hidden="true">
      <div class="skeleton-block"></div>
      <div class="skeleton-line w1"></div>
      <div class="skeleton-line w2"></div>
      <div class="skeleton-line w3"></div>
    </aside>

    <section class="center-col">
      <h1 class="post-title">Welcome to Chévere</h1>
      <p class="post-subtitle">A note before we begin</p>
      <div class="post-meta">
        <span>34 mins ago</span><span class="dot">•</span><span>Chévere</span>
      </div>
    </section>

    <aside class="side-col right" aria-hidden="true">
      <div class="skeleton-block"></div>
      <div class="skeleton-line w1"></div>
      <div class="skeleton-line w2"></div>
      <div class="skeleton-line w3"></div>
    </aside>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
    document.querySelectorAll('.nav-item.has-dropdown > a').forEach(function (a) {
      a.addEventListener('click', function (e) {
        var item = a.parentElement;
        if (window.matchMedia('(hover: none)').matches && !item.classList.contains('open')) {
          e.preventDefault();
          item.classList.add('open');
          document.addEventListener('click', function (ev) {
            if (!item.contains(ev.target)) item.classList.remove('open');
          }, { once: true });
        }
      });
    });
  </script>

</body>
</html>
