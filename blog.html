<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — chévere</title>
  <link rel="icon" type="image/png" href="assets/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,600;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <a class="header-mini-logo" href="index.html" aria-label="chévere home">
      <img src="assets/logo.png" alt="chévere" />
    </a>
    <a class="header-logo" href="index.html" aria-label="chévere home">
      <img src="assets/logo.png" alt="chévere" />
    </a>
    <div class="header-actions">
      <button aria-label="Search" title="Search"><i data-lucide="search" stroke-width="1.8" aria-hidden="true"></i></button>
      <button aria-label="Chat" title="Chat"><i data-lucide="message-circle" stroke-width="1.8" aria-hidden="true"></i></button>
      <button aria-label="Notifications" title="Notifications"><i data-lucide="bell" stroke-width="1.8" aria-hidden="true"></i></button>
    </div>
  </header>

  <nav class="site-nav">
    <a href="index.html">Home</a>
    <div class="nav-item has-dropdown">
      <a href="blog.html" class="active">Blog<i data-lucide="chevron-down" class="chev" stroke-width="2" aria-hidden="true"></i></a>
      <div class="dropdown">
        <a href="blog.html">All Blogs</a>
        <a href="blog.html?cat=books">Books</a>
        <a href="blog.html?cat=tv-film">TV &amp; Film</a>
        <a href="blog.html?cat=travel">Travel</a>
        <a href="blog.html?cat=food-drink">Food &amp; Drink</a>
        <a href="blog.html?cat=fashion">Fashion</a>
      </div>
    </div>
    <a href="about.html">About</a>
  </nav>

  <main class="blog-main">
    <div class="blog-head">
      <h1 id="blog-heading">The Blog</h1>
      <p>Curated edits, stories, and current obsessions — chosen with intention.</p>
    </div>

    <div class="cat-pills" aria-label="Filter posts by category">
      <button data-cat="all" class="active">All Blogs</button>
      <button data-cat="books">Books</button>
      <button data-cat="tv-film">TV &amp; Film</button>
      <button data-cat="travel">Travel</button>
      <button data-cat="food-drink">Food &amp; Drink</button>
      <button data-cat="fashion">Fashion</button>
    </div>

    <div class="post-grid" id="post-grid">
      <!--
        Published posts go here. Card template (data-cat controls the category filter —
        use one of: books, tv-film, travel, food-drink, fashion):

        <a class="post-card" data-cat="books" href="posts/my-post.html">
          <div class="thumb"></div>
          <span class="kicker">Books</span>
          <h2>Post title</h2>
          <p class="dek">One-line description of the post.</p>
          <p class="date">Jul 4, 2026</p>
        </a>

        Add class="featured" to the newest post to render it full-width at the top.
      -->
    </div>

    <div class="blog-empty" id="blog-empty" hidden>
      <i data-lucide="feather" stroke-width="1.6" aria-hidden="true"></i>
      <h2>Nothing published here yet</h2>
      <p>The first edit is on its way — check back soon.</p>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();

    (function () {
      var cards = Array.prototype.slice.call(document.querySelectorAll('.post-card'));
      var pills = Array.prototype.slice.call(document.querySelectorAll('.cat-pills button'));
      var heading = document.getElementById('blog-heading');
      var empty = document.getElementById('blog-empty');
      var names = {
        'all': 'The Blog',
        'books': 'Books',
        'tv-film': 'TV & Film',
        'travel': 'Travel',
        'food-drink': 'Food & Drink',
        'fashion': 'Fashion'
      };
      function apply(cat) {
        var visible = 0;
        cards.forEach(function (c) {
          var hide = cat !== 'all' && c.getAttribute('data-cat') !== cat;
          c.classList.toggle('hidden', hide);
          if (!hide) visible++;
        });
        pills.forEach(function (p) {
          p.classList.toggle('active', p.getAttribute('data-cat') === cat);
        });
        heading.textContent = names[cat] || 'The Blog';
        empty.hidden = visible > 0;
      }
      pills.forEach(function (p) {
        p.addEventListener('click', function () {
          var cat = p.getAttribute('data-cat');
          history.replaceState(null, '', cat === 'all' ? 'blog.html' : 'blog.html?cat=' + cat);
          apply(cat);
        });
      });
      var q = new URLSearchParams(location.search).get('cat') || location.hash.slice(1) || 'all';
      apply(names[q] ? q : 'all');
    })();

    document.querySelectorAll('.nav-item.has-dropdown > a').forEach(function (a) {
      a.addEventListener('click', function (e) {
        var item = a.parentElement;
        if (window.matchMedia('(hover: none)').matches && !item.classList.contains('open')) {
          e.preventDefault();
          item.classList.add('open');
          document.addEventListener('click', function (ev) {
            if (!item.contains(ev.target)) item.classList.remove('open');
          }, { once: true });
        }
      });
    });
  </script>

</body>
</html>
